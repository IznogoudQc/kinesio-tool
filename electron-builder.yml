appId: com.kinesio-conseil.kinesio-tool
productName: Kinésio Outils
copyright: Copyright © 2026 Kinésio Conseil

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - package.json

# Migrations Drizzle copiées dans resources/migrations/ (lues par initDb en prod)
# Avatars de demo (Nicholas Jean, Sabrina Dumais) copies dans resources/demo-avatars/
extraResources:
  - from: db/migrations
    to: migrations
    filter:
      - "**/*"
  - from: build/demo-avatars
    to: demo-avatars
    filter:
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.webp"

asarUnpack:
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/sharp/**/*"
  - "node_modules/@img/**/*"

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Kinésio Outils
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerLanguages:
    - fr_FR
  language: 1036

publish:
  provider: github
  owner: IznogoudQc
  repo: kinesio-tool
  releaseType: release
